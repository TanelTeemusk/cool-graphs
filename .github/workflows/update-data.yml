name: Update data

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:        # manual trigger button in GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scraper.js

      - name: Deploy to Zone.ee via FTPS
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            open -u '${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_HOST }};
            put -O / gold.json;
            put -O / tallinn-kesklinn.json;
            put -O / tartu-kesklinn.json;
            put -O / index.html;
            put -O / tallinn-kesklinn.html;
            put -O / tartu-kesklinn.html;
            put -O / style.css;
            put -O / dashboard.js;
            quit
          "
